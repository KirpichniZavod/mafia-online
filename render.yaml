services:
  - type: web
    name: mafia-server
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: node src/index.js
    rootDir: server
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://mafia-online-lxgk.onrender.com
      - key: NODE_ENV
        value: production

  - type: web
    name: mafia-client
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: client
    envVars:
      - key: NODE_ENV
        value: production
